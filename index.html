<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master IP</title>
  <meta name="description" content="Master IP Address Management System — 22 titik site dengan data server dan aplikasi">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #080c14;
      --bg-secondary:  #0d1422;
      --bg-card:       #111827;
      --bg-hover:      #1a2436;
      --bg-glass:      rgba(17, 24, 39, 0.8);
      --border:        rgba(0, 212, 255, 0.12);
      --border-active: rgba(0, 212, 255, 0.45);
      --text-primary:  #e8f0fe;
      --text-secondary:#8fa3c0;
      --text-dim:      #4a617a;
      --accent-cyan:   #00d4ff;
      --accent-blue:   #3b82f6;
      --accent-gold:   #f59e0b;
      --accent-yellow: #fde047;
      --accent-green:  #22c55e;
      --accent-red:    #ef4444;
      --eyesee:        #eab308;
      --server-color:  #f97316;
      --app-color:     #3b82f6;
      --radius:        12px;
      --radius-sm:     8px;
      --shadow:        0 8px 32px rgba(0, 0, 0, 0.5);
      --shadow-glow:   0 0 20px rgba(0, 212, 255, 0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% -10%, rgba(0,212,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 110%, rgba(59,130,246,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ══════════════════ LAYOUT ══════════════════ */
    .app-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── Top Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 28px;
      background: rgba(13, 20, 34, 0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,212,255,0.3);
      position: relative;
    }
    .header-logo svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    .header-brand { flex: 1; }
    .header-brand h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent-cyan);
    }
    .header-brand p {
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      margin-top: 1px;
    }

    .header-stats {
      display: flex;
      gap: 20px;
    }
    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 14px;
      background: rgba(0,212,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .stat-chip span:first-child {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent-cyan);
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-chip span:last-child {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Main body ── */
    .main-body {
      display: flex;
      flex: 1;
      height: calc(100vh - 73px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 12px 9px 36px;
      color: var(--text-primary);
      font-size: 0.83rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box input::placeholder { color: var(--text-dim); }
    .search-box input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.08);
    }
    .search-box .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      width: 15px;
      height: 15px;
    }

    .site-count-label {
      margin-top: 10px;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .site-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .site-list::-webkit-scrollbar { width: 4px; }
    .site-list::-webkit-scrollbar-track { background: transparent; }
    .site-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .site-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      border: 1px solid transparent;
      margin-bottom: 3px;
    }
    .site-item:hover {
      background: var(--bg-hover);
      border-color: var(--border);
      transform: translateX(2px);
    }
    .site-item.active {
      background: rgba(0,212,255,0.08);
      border-color: var(--accent-cyan);
    }
    .site-item.active .site-num { color: var(--accent-cyan); }
    .site-item.active .site-name { color: var(--text-primary); }

    .site-badge {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: background 0.18s, border-color 0.18s;
    }
    .site-item.active .site-badge {
      background: rgba(0,212,255,0.12);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .site-info { flex: 1; min-width: 0; }
    .site-num {
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
    }
    .site-name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-block-ip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-dim);
    }

    .site-arrow {
      color: var(--text-dim);
      width: 14px;
      height: 14px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .site-item.active .site-arrow,
    .site-item:hover .site-arrow { opacity: 1; color: var(--accent-cyan); }

    /* ── Main Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Welcome screen ── */
    .welcome-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      animation: fadeIn 0.4s ease;
    }
    .welcome-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(59,130,246,0.1));
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    .welcome-screen h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .welcome-screen p {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-align: center;
      max-width: 320px;
      line-height: 1.6;
    }

    /* ── Site Detail ── */
    .site-detail { animation: slideIn 0.3s ease; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
    }

    .detail-title-group { }
    .detail-breadcrumb {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .detail-title {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .detail-subtitle {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .detail-block-ip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--accent-yellow);
      background: rgba(253,224,71,0.06);
      border: 1px solid rgba(253,224,71,0.2);
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-block;
      margin-top: 8px;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
      border: none;
      outline: none;
    }
    .btn svg { width: 14px; height: 14px; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-outline:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      background: rgba(0,212,255,0.05);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      color: white;
    }
    .btn-primary:hover {
      box-shadow: 0 0 16px rgba(0,212,255,0.3);
      transform: translateY(-1px);
    }

    /* ── Info bar ── */
    .info-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.2s;
    }
    .info-card:hover { border-color: rgba(0,212,255,0.25); }
    .info-card-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .info-card-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .info-card-value.cyan { color: var(--accent-cyan); }
    .info-card-value.yellow { color: var(--accent-yellow); }
    .info-card-value.green { color: var(--accent-green); }

    /* ── IP Table ── */
    .table-section { }
    .table-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .table-section-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .table-section-title::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent-cyan);
      border-radius: 2px;
      display: inline-block;
    }

    .ip-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .ip-table th {
      padding: 11px 16px;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .ip-table th:last-child { text-align: center; }

    .ip-table td {
      padding: 13px 16px;
      font-size: 0.84rem;
      border-bottom: 1px solid rgba(0,212,255,0.05);
      vertical-align: middle;
      transition: background 0.15s;
    }
    .ip-table tr:last-child td { border-bottom: none; }
    .ip-table tr:hover td { background: var(--bg-hover); }

    .ip-table tr.highlight-eyesee td {
      background: rgba(234,179,8,0.04);
    }
    .ip-table tr.highlight-eyesee:hover td {
      background: rgba(234,179,8,0.08);
    }

    .row-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .app-name {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-name.eyesee-name { color: var(--eyesee); }

    .type-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .type-badge.server {
      background: rgba(249,115,22,0.12);
      color: var(--server-color);
      border: 1px solid rgba(249,115,22,0.25);
    }
    .type-badge.app {
      background: rgba(59,130,246,0.12);
      color: var(--app-color);
      border: 1px solid rgba(59,130,246,0.25);
    }
    .type-badge.eyesee-badge {
      background: rgba(234,179,8,0.12);
      color: var(--eyesee);
      border: 1px solid rgba(234,179,8,0.3);
    }

    .ip-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.84rem;
      color: var(--accent-cyan);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ip-value.eyesee-ip { color: var(--eyesee); }

    .ip-copy-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 5px;
      padding: 3px 7px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.7rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .ip-copy-btn:hover {
      background: rgba(0,212,255,0.08);
      border-color: var(--border);
      color: var(--accent-cyan);
    }
    .ip-copy-btn.copied {
      color: var(--accent-green);
      border-color: rgba(34,197,94,0.3);
      background: rgba(34,197,94,0.06);
    }
    .ip-copy-btn svg { width: 12px; height: 12px; }

    .copy-all-col { text-align: center; }
    .copy-all-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 0.7rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .copy-all-btn:hover {
      background: rgba(0,212,255,0.06);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }
    .copy-all-btn.copied {
      color: var(--accent-green);
      border-color: rgba(34,197,94,0.3);
      background: rgba(34,197,94,0.06);
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg-card);
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toastIn 0.25s ease forwards;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .toast svg { width: 15px; height: 15px; flex-shrink: 0; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── All Sites grid view ── */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .all-sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .grid-site-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .grid-site-card:hover {
      border-color: var(--accent-cyan);
      background: var(--bg-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }
    .grid-site-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent-cyan);
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .grid-site-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .grid-site-ip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
    }
    .grid-site-apps {
      margin-top: 10px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .grid-app-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--app-color);
    }
    .grid-app-dot.eyesee { background: var(--eyesee); }
    .grid-app-dot.server { background: var(--server-color); }

    /* ── No results ── */
    .no-results {
      padding: 30px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.82rem;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar { width: 100%; max-height: 250px; }
      .main-body { flex-direction: column; height: auto; }
      .content { padding: 16px; }
      .header-stats { display: none; }
      .detail-header { flex-direction: column; gap: 12px; }
      .all-sites-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- ══ HEADER ══ -->
  <header class="header">
    <!-- <div class="header-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8.3v7.4l-7 3.89-7-3.89V8.3L12 4.18zM12 7a1 1 0 100 2 1 1 0 000-2zm-4 3v1h2v-1H8zm8 0v1h-2v-1h2zm-4 1a3 3 0 100 6 3 3 0 000-6zm0 2a1 1 0 110 2 1 1 0 010-2z"/>
      </svg>
    </div> -->
    <div class="header-brand">
      <h1>Master Data-IP</h1>
      <p>Master IP Address Management System</p>
    </div>
    <div class="header-stats">
      <div class="stat-chip">
        <span id="stat-sites">22</span>
        <span>Sites</span>
      </div>
      <div class="stat-chip">
        <span>8</span>
        <span>Types</span>
      </div>
      <div class="stat-chip">
        <span id="stat-total">176</span>
        <span>Total IP</span>
      </div>
    </div>
  </header>

  <!-- ══ MAIN BODY ══ -->
  <div class="main-body">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="site-search" placeholder="Cari site..." autocomplete="off">
        </div>
        <div class="site-count-label" id="site-count-label">22 Site tersedia</div>
      </div>
      <div class="site-list" id="site-list">
        <!-- generated by JS -->
      </div>
    </aside>

    <!-- ── CONTENT ── -->
    <main class="content" id="main-content">
      <!-- Welcome or detail injected here -->
    </main>

  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
  // ════════════════════════════════════════
  //  DATA GENERATOR
  // ════════════════════════════════════════

  const APP_DEFINITIONS = [
    { key: 'router',  name: 'Proxmox Router Gateway', type: 'server', offset: 1 },
    { key: 'proxmox', name: 'Proxmox Server',         type: 'server', offset: 2 },
    { key: 'maps',    name: 'Maps',                   type: 'app',    offset: 3 },
    { key: 'bms',     name: 'BMS',                    type: 'app',    offset: 4 },
    { key: 'blm',     name: 'BLM',                    type: 'app',    offset: 5 },
    { key: 'eyesee',  name: 'EYESEE',                 type: 'app',    offset: 6, highlight: true },
    { key: 'storage', name: 'Storage Server',         type: 'server', offset: 7 },
    { key: 'chat',    name: 'Chat',                   type: 'app',    offset: 8 },
  ];

  const SITE_NAMES = [
    'Site 1','Site 2','Site 3','Site 4','Site 5','Site 6','Site 7','Site 8',
    'Site 9','Site 10','Site 11','Site 12','Site 13','Site 14','Site 15','Site 16',
    'Site 17','Site 18','Site 19','Site 20','Site 21','Site 22',
  ];

  function generateIP(siteIndex, offset = 0) {
    // Base: 172.27.x.y, each site = /27 = 32 IPs
    const totalBase = siteIndex * 32;
    const thirdOctet = Math.floor(totalBase / 256);
    const fourthOctet = (totalBase % 256) + offset;
    return `172.27.${thirdOctet}.${fourthOctet}`;
  }

  function generateSites() {
    return Array.from({ length: 22 }, (_, i) => {
      const blockBase = generateIP(i, 0);
      return {
        id: `SITE-${String(i + 1).padStart(2, '0')}`,
        name: SITE_NAMES[i],
        blockIP: `${blockBase}/27`,
        apps: APP_DEFINITIONS.map(def => ({
          ...def,
          ip: generateIP(i, def.offset),
          fullIP: `${generateIP(i, def.offset)}/27`,
        })),
      };
    });
  }

  const SITES = generateSites();

  // ════════════════════════════════════════
  //  STATE
  // ════════════════════════════════════════
  let activeSiteId = null;
  let filteredSites = [...SITES];

  // ════════════════════════════════════════
  //  RENDER SIDEBAR
  // ════════════════════════════════════════
  function renderSidebar(sites) {
    const list = document.getElementById('site-list');
    const label = document.getElementById('site-count-label');
    label.textContent = `${sites.length} Site tersedia`;

    if (sites.length === 0) {
      list.innerHTML = `<div class="no-results">Tidak ada site ditemukan</div>`;
      return;
    }

    list.innerHTML = sites.map(site => `
      <div class="site-item ${activeSiteId === site.id ? 'active' : ''}"
           id="sidebar-${site.id}"
           onclick="selectSite('${site.id}')">
        <div class="site-badge">${site.id.replace('SITE-', '')}</div>
        <div class="site-info">
          <div class="site-num">${site.id}</div>
          <div class="site-name">${site.name}</div>
          <div class="site-block-ip">${site.blockIP}</div>
        </div>
        <svg class="site-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </div>
    `).join('');
  }

  // ════════════════════════════════════════
  //  RENDER WELCOME
  // ════════════════════════════════════════
  function renderWelcome() {
    const content = document.getElementById('main-content');
    content.innerHTML = `
      <div class="welcome-screen">
        <div class="welcome-icon">🌐</div>
        <h2>Pilih Site</h2>
        <p>Pilih salah satu dari 22 site di panel kiri untuk melihat detail IP server dan aplikasi.</p>
      </div>

      <div class="section-divider"></div>

      <div>
        <div class="table-section-header">
          <div class="table-section-title">Semua Site</div>
        </div>
        <div class="all-sites-grid">
          ${SITES.map(site => `
            <div class="grid-site-card" onclick="selectSite('${site.id}')">
              <div class="grid-site-id">${site.id}</div>
              <div class="grid-site-name">${site.name}</div>
              <div class="grid-site-ip">${site.blockIP}</div>
              <div class="grid-site-apps">
                ${site.apps.map(a => `<div class="grid-app-dot ${a.highlight ? 'eyesee' : a.type}" title="${a.name}"></div>`).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // ════════════════════════════════════════
  //  RENDER SITE DETAIL
  // ════════════════════════════════════════
  function renderDetail(site) {
    const content = document.getElementById('main-content');

    const serverApps  = site.apps.filter(a => a.type === 'server');
    const appApps     = site.apps.filter(a => a.type === 'app');

    const buildRow = (app, idx) => `
      <tr class="${app.highlight ? 'highlight-eyesee' : ''}">
        <td class="row-num">${String(idx + 1).padStart(2, '0')}</td>
        <td>
          <div class="app-name ${app.highlight ? 'eyesee-name' : ''}">
            ${app.highlight ? '⚡ ' : ''}${app.name}
            <span class="type-badge ${app.highlight ? 'eyesee-badge' : app.type}">
              ${app.highlight ? 'EYESEE' : app.type.toUpperCase()}
            </span>
          </div>
        </td>
        <td>
          <div class="ip-value ${app.highlight ? 'eyesee-ip' : ''}">
            ${app.fullIP}
            <button class="ip-copy-btn" onclick="copyIP('${app.fullIP}', this)" title="Salin IP">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
              </svg>
              Salin
            </button>
          </div>
        </td>
        <td class="copy-all-col">
          <button class="copy-all-btn" onclick="copyIP('${app.ip}', this)" title="Salin IP saja">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
            </svg>
            IP Only
          </button>
        </td>
      </tr>
    `;

    content.innerHTML = `
      <div class="site-detail">

        <!-- Header -->
        <div class="detail-header">
          <div class="detail-title-group">
            <div class="detail-breadcrumb">Master IP / ${site.id}</div>
            <h2 class="detail-title">${site.name}</h2>
            <div class="detail-subtitle">Detail IP Address — Server &amp; Aplikasi</div>
            <div class="detail-block-ip">📦 Block IP: ${site.blockIP}</div>
          </div>
          <div class="detail-actions">
            <button class="btn btn-outline" onclick="copyAllIPs('${site.id}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"></path>
              </svg>
              Salin Semua
            </button>
            <button class="btn btn-outline" onclick="renderWelcome(); activeSiteId = null; renderSidebar(filteredSites);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="8" y1="6" x2="21" y2="6"></line>
                <line x1="8" y1="12" x2="21" y2="12"></line>
                <line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                <line x1="3" y1="18" x2="3.01" y2="18"></line>
              </svg>
              Semua Site
            </button>
          </div>
        </div>

        <!-- Info cards -->
        <div class="info-bar">
          <div class="info-card">
            <div class="info-card-label">Site ID</div>
            <div class="info-card-value cyan">${site.id}</div>
          </div>
          <div class="info-card">
            <div class="info-card-label">Block IP / Subnet</div>
            <div class="info-card-value yellow">${site.blockIP}</div>
          </div>
          <div class="info-card">
            <div class="info-card-label">Subnet Mask</div>
            <div class="info-card-value">255.255.255.224</div>
          </div>
          <div class="info-card">
            <div class="info-card-label">Total IP Used</div>
            <div class="info-card-value green">${site.apps.length} / 30</div>
          </div>
          <div class="info-card">
            <div class="info-card-label">Default Gateway</div>
            <div class="info-card-value cyan">${site.apps.find(a=>a.key==='router').ip}</div>
          </div>
        </div>

        <!-- IP Table -->
        <div class="table-section">
          <div class="table-section-header">
            <div class="table-section-title">Daftar IP Address</div>
          </div>
          <table class="ip-table">
            <thead>
              <tr>
                <th width="40">#</th>
                <th>Nama / Jenis Kebutuhan</th>
                <th>IP Address / Subnet</th>
                <th class="copy-all-col" width="120">Aksi</th>
              </tr>
            </thead>
            <tbody>
              ${site.apps.map((app, i) => buildRow(app, i)).join('')}
            </tbody>
          </table>
        </div>

      </div>
    `;
  }

  // ════════════════════════════════════════
  //  SELECT SITE
  // ════════════════════════════════════════
  function selectSite(siteId) {
    activeSiteId = siteId;
    const site = SITES.find(s => s.id === siteId);
    if (!site) return;

    // Update sidebar active state
    document.querySelectorAll('.site-item').forEach(el => el.classList.remove('active'));
    const sidebarItem = document.getElementById(`sidebar-${siteId}`);
    if (sidebarItem) {
      sidebarItem.classList.add('active');
      sidebarItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    renderDetail(site);
  }

  // ════════════════════════════════════════
  //  COPY
  // ════════════════════════════════════════
  function copyIP(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      const original = btn.innerHTML;
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg> Tersalin
      `;
      showToast(`IP disalin: ${text}`);
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = original;
      }, 2000);
    });
  }

  function copyAllIPs(siteId) {
    const site = SITES.find(s => s.id === siteId);
    if (!site) return;
    const text = [
      `=== ${site.id} — ${site.name} ===`,
      `Block IP: ${site.blockIP}`,
      ``,
      ...site.apps.map(a => `${a.name.padEnd(24)} : ${a.fullIP}`)
    ].join('\n');

    navigator.clipboard.writeText(text).then(() => {
      showToast('Semua IP berhasil disalin ke clipboard!');
    });
  }

  // ════════════════════════════════════════
  //  TOAST
  // ════════════════════════════════════════
  function showToast(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      ${message}
    `;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  // ════════════════════════════════════════
  //  SEARCH
  // ════════════════════════════════════════
  document.getElementById('site-search').addEventListener('input', function () {
    const q = this.value.toLowerCase().trim();
    filteredSites = SITES.filter(s =>
      s.id.toLowerCase().includes(q) ||
      s.name.toLowerCase().includes(q) ||
      s.blockIP.includes(q)
    );
    renderSidebar(filteredSites);
  });

  // ════════════════════════════════════════
  //  INIT
  // ════════════════════════════════════════
  document.getElementById('stat-sites').textContent = SITES.length;
  document.getElementById('stat-total').textContent = SITES.length * APP_DEFINITIONS.length;

  renderSidebar(SITES);
  renderWelcome();
</script>

</body>
</html>
